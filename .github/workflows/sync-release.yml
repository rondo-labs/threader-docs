name: Sync Private Release

on:
  repository_dispatch:
    types: [sync_private_release]
  workflow_dispatch:
    inputs:
      source_tag:
        description: Release tag to sync from the private repository
        required: false

permissions:
  contents: write

concurrency:
  group: sync-release-${{ github.event.client_payload.tag_name || inputs.source_tag || 'manual' }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Mirror private release into public releases
        run: node scripts/sync-release.mjs
        env:
          SOURCE_OWNER: ${{ github.event.client_payload.source_owner || 'rondo-labs' }}
          SOURCE_REPO: ${{ github.event.client_payload.source_repo || 'threader' }}
          SOURCE_TAG: ${{ github.event.client_payload.tag_name || inputs.source_tag }}
          SOURCE_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
          TARGET_OWNER: ${{ github.repository_owner }}
          TARGET_REPO: ${{ github.event.repository.name }}
          TARGET_TOKEN: ${{ github.token }}
